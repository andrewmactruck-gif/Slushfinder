# ============================================================
# Slush Finder — Nginx Config for Hostinger VPS
# File location on server: /etc/nginx/sites-available/slushfinder
# EDIT: Replace every instance of yourdomain.com with your real domain
# ============================================================

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy all requests to Next.js on port 3000
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }

    # Cache Next.js static assets forever (they are content-hashed)
    location /_next/static/ {
        proxy_pass http://localhost:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Cache public assets (logo, images)
    location /logo.png {
        proxy_pass http://localhost:3000;
        add_header Cache-Control "public, max-age=86400";
    }

    # Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript;
    gzip_comp_level 6;
    gzip_min_length 1000;
}

# HTTPS block added automatically by certbot after you run:
# sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com
